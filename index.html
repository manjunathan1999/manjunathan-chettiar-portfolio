  <script>
    // Blinking cursor favicon — swaps between >_ and > every 600ms
    (function () {
      var frames = ['/favicon-on.svg', '/favicon-off.svg'];
      var current = 0;
      var link = document.getElementById('favicon');
      setInterval(function () {
        current = current === 0 ? 1 : 0;
        link.href = frames[current];
      }, 100);
    })();
  </script>
